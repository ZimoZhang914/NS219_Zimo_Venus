# Smoke test config — tiny everything, just to verify the pipeline runs end-to-end.
run_name: smoke_test
output_dir: results/smoke_test
seed: 42

data:
  h5ad_path: data/vineseq_microglia_smoketest.h5ad
  tenx_dir: null
  celltype_col: null
  microglia_labels: []
  donor_col: donor_id
  condition_col: condition
  ad_label: AD
  control_label: Control

qc:
  min_genes_per_cell: 200
  min_cells_per_gene: 3
  max_mt_percent: 15
  max_counts: 50000

preprocess:
  n_top_genes: 1000          # smaller HVG set for speed
  target_sum: 10000
  scale: false
  batch_correction: none      # skip Harmony for the smoke test
  batch_key: donor_id

vae:
  hidden_dims: [128, 64]      # small VAE
  latent_dim: 16
  dropout: 0.1
  likelihood: poisson
  beta: 1.0
  warmup_epochs: 2
  batch_size: 256
  epochs: 10                  # only 10 epochs!
  lr: 1.0e-3
  weight_decay: 1.0e-6
  patience: 5
  val_fraction: 0.1

clustering:
  resolutions: [0.3, 0.5]
  n_neighbors: 15

classifier:
  reference_label_col: cell_state   # we don't have this — pipeline will skip supervised step
  model: xgboost
  use_optuna: false
  optuna_trials: 5
  test_fraction: 0.2
  use_smote: false
  confidence_threshold: 0.7

dam:
  extra_signatures: {}
  test: wilcoxon

eval:
  make_umap: true
  umap_color_by:
    - leiden
    - condition
    - DAM_score
  save_h5ad: true